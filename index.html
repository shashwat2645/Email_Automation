<!DOCTYPE html>
<html>
<head>
    <title>Customer Support</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f4f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .form-wrap {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border: 1px solid #e5e5e2;
            border-radius: 14px;
            padding: 2rem;
        }

        .form-header {
            margin-bottom: 1.75rem;
        }

        .form-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #111;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-header p {
            font-size: 14px;
            color: #777;
        }

        .field {
            margin-bottom: 1.25rem;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .field input,
        .field textarea {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            color: #111;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: #aaa;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
            background: #fff;
        }

        .field textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.6;
        }

        .field input.err,
        .field textarea.err {
            border-color: #e24b4a;
            background: #fff8f8;
        }

        .field-error {
            font-size: 12px;
            color: #c0392b;
            margin-top: 5px;
            display: none;
        }

        .field-error.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 11px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            background: #111;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.15s, transform 0.1s;
            margin-top: 0.25rem;
            font-family: inherit;
        }

        .submit-btn:hover {
            opacity: 0.85;
        }

        .submit-btn:active {
            transform: scale(0.99);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success-banner {
            display: none;
            background: #eaf3de;
            border: 1px solid #b0d47a;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            color: #3b6d11;
            margin-top: 1rem;
            align-items: center;
            gap: 8px;
        }

        .success-banner.show {
            display: flex;
        }

        .error-banner {
            display: none;
            background: #fcebeb;
            border: 1px solid #f09595;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            color: #a32d2d;
            margin-top: 1rem;
            align-items: center;
            gap: 8px;
        }

        .error-banner.show {
            display: flex;
        }
    </style>
</head>
<body>

<div class="form-wrap">
    <div class="form-header">
        <h2>
            <i class="ti ti-message-circle" style="font-size:20px;"></i>
            Contact us
        </h2>
        <p>We'll get back to you as soon as possible.</p>
    </div>

    <form id="contactForm" novalidate>
        <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your full name" minlength="2" required autocomplete="name">
            <div class="field-error" id="nameErr">Please enter a valid name (at least 2 characters).</div>
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
            <div class="field-error" id="emailErr">Please enter a valid email address.</div>
        </div>

        <div class="field">
            <label for="message">Message</label>
            <textarea id="message" placeholder="How can we help?" minlength="10" required></textarea>
            <div class="field-error" id="messageErr">Message must be at least 10 characters.</div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            <i class="ti ti-send"></i>
            <span id="btnText">Send message</span>
        </button>

        <div class="success-banner" id="successBanner">
            <i class="ti ti-circle-check" style="font-size:18px; flex-shrink:0;"></i>
            Message sent! We'll be in touch soon.
        </div>
        <div class="error-banner" id="errorBanner">
            <i class="ti ti-alert-circle" style="font-size:18px; flex-shrink:0;"></i>
            Something went wrong. Please try again.
        </div>
    </form>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    let valid = true;

    function setError(errId, inputId, show) {
        document.getElementById(errId).classList.toggle("show", show);
        document.getElementById(inputId).classList.toggle("err", show);
        if (show) valid = false;
    }

    // Name validation
    setError("nameErr", "name", name.length < 2);

    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    setError("emailErr", "email", !emailRegex.test(email));

    // Message validation
    setError("messageErr", "message", message.length < 10);

    if (!valid) return;

    const button = document.getElementById("submitBtn");
    const btnText = document.getElementById("btnText");
    button.disabled = true;
    btnText.textContent = "Sending...";
    document.getElementById("successBanner").classList.remove("show");
    document.getElementById("errorBanner").classList.remove("show");

    const data = { name, email, message };

    try {
        const response = await fetch("https://shashwat-2645.app.n8n.cloud/webhook/customer-support", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        if (!response.ok) {
            throw new Error("Failed to submit");
        }

        document.getElementById("successBanner").classList.add("show");
        document.getElementById("contactForm").reset();

    } catch (error) {
        console.error(error);
        document.getElementById("errorBanner").classList.add("show");
    } finally {
        button.disabled = false;
        btnText.textContent = "Send message";
    }
});
</script>

</body>
</html>
